<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
        }

        .register-box{
            width:420px;
            padding:40px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            border-radius:20px;
            box-shadow:0 0 30px rgba(0,0,0,0.4);
            color:white;
        }

        .register-box h1{
            text-align:center;
            margin-bottom:30px;
            color:#38bdf8;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:16px;
        }

        .register-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .register-btn:hover{
            transform:scale(1.03);
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
        }

        .bottom-text a{
            color:#38bdf8;
            text-decoration:none;
        }

    </style>

</head>

<body>

    <div class="register-box">

        <h1>Create Account</h1>

        <form method="POST">

            {% csrf_token %}

            <div class="input-box">
                {{ form.first_name }}
            </div>

            <div class="input-box">
                {{ form.email }}
            </div>

            <div class="input-box">
                {{ form.username }}
            </div>

            <div class="input-box">
                {{ form.password }}
            </div>

            <button type="submit" class="register-btn">
                Register
            </button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="/login">Login</a>
        </div>

    </div>

</body>

</html>
